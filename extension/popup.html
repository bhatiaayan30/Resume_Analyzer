<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Resume Analyzer Catcher</title>
    <style>
        body { width: 300px; padding: 16px; font-family: -apple-system, sans-serif; background: #030712; color: #f8fafc; }
        h2 { font-size: 16px; margin-top: 0; }
        p { font-size: 13px; color: #94a3b8; }
        button { 
            width: 100%; padding: 10px; background: #8b5cf6; color: white; 
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #a78bfa; }
        #status { margin-top: 10px; font-size: 12px; color: #34d399; display: none; }
    </style>
</head>
<body>
    <h2>Resume Analyzer</h2>
    <p>Extract job description text from the current page and open the analyzer.</p>
    <button id="capture-btn">Capture & Analyze</button>
    <div id="status">Captured successfully! Opening app...</div>
    <script src="popup.js"></script>
</body>
</html>
