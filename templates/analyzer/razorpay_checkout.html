{% extends "analyzer/base.html" %}

{% block title %}Checkout - Razorpay{% endblock %}
{% block meta_robots %}noindex, nofollow{% endblock %}

{% block content %}
<div class="text-center py-20 min-h-[50vh] flex flex-col items-center justify-center">
    <h2 class="text-2xl text-white mb-6 font-bold">Secure Checkout via Razorpay</h2>
    <p class="text-gray-400 mb-8">Please complete your payment in the popup window.</p>
    <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-brand mx-auto mb-4"></div>
    <button id="rzp-button1" class="hidden px-6 py-2 bg-brand text-white font-bold rounded hover:bg-brand-hover transition">
        Open Payment Window
    </button>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
    var options = {
        "key": "{{ razorpay_key }}",
        "amount": "{{ amount }}",
        "currency": "INR",
        "order_id": "{{ order_id }}",
        "name": "Resume Analyzer",
        "description": "Premium Plan ({% if annual %}Annual{% else %}Monthly{% endif %})",
        "theme": {
            "color": "#a78bfa"
        },
        "prefill": {
            "email": "{{ user_email }}"
        },
        "handler": function (response){
            // Razorpay returns razorpay_payment_id, razorpay_subscription_id, razorpay_signature
            // We can rely on the webhook to upgrade the user's tier in the background.
            window.location.href = "/?payment_success=true";
        },
        "modal": {
            "ondismiss": function(){
                window.location.href = "/pricing/";
            }
        }
    };
    
    var rzp1 = new Razorpay(options);
    
    rzp1.on('payment.failed', function (response){
        var errorDesc = encodeURIComponent(response.error.description || 'Payment transaction failed.');
        var errorCode = encodeURIComponent(response.error.code || 'payment_failed');
        var orderId = encodeURIComponent((response.error.metadata && response.error.metadata.order_id) || '');
        var paymentId = encodeURIComponent((response.error.metadata && response.error.metadata.payment_id) || '');
        window.location.href = "/payment-failed/?error=" + errorDesc + "&code=" + errorCode + "&order_id=" + orderId + "&payment_id=" + paymentId;
    });

    
    // Automatically open the checkout modal
    document.addEventListener("DOMContentLoaded", function() {
        rzp1.open();
        
        // Show fallback button if popup is blocked
        setTimeout(() => {
            document.getElementById('rzp-button1').classList.remove('hidden');
            document.getElementById('rzp-button1').onclick = function(e){
                rzp1.open();
                e.preventDefault();
            }
        }, 3000);
    });
</script>
{% endblock %}
