{% extends 'analyzer/base.html' %}
{% block title %}Email Sent{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-12 premium-card text-center">
    <div class="w-16 h-16 bg-brand/20 text-brand rounded-full flex items-center justify-center mx-auto mb-6">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
    </div>
    <h2 class="text-2xl font-bold text-white mb-4">Check your inbox</h2>
    <p class="text-gray-400 mb-6">We've emailed you instructions for setting your password, if an account exists with the email you entered.</p>
    <a href="{% url 'login' %}" class="text-brand hover:text-brand-light font-semibold">Return to login</a>
</div>
{% endblock %}
