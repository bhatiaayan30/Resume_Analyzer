{% extends 'analyzer/base.html' %}
{% block title %}Password Reset Complete{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-12 premium-card text-center">
    <div class="w-16 h-16 bg-green-500/20 text-green-400 rounded-full flex items-center justify-center mx-auto mb-6">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
    </div>
    <h2 class="text-2xl font-bold text-white mb-4">Password reset complete</h2>
    <p class="text-gray-400 mb-6">Your password has been set. You may go ahead and log in now.</p>
    <a href="{% url 'login' %}" class="inline-block bg-brand text-white py-3 px-8 rounded-xl font-bold hover:bg-brand-light transition-all">Log in</a>
</div>
{% endblock %}
