{% extends 'analyzer/base.html' %}
{% block title %}Password Reset Complete - AI Resume Analyzer{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-12 relative">
    <div class="absolute -inset-1 bg-gradient-to-r from-brand to-indigo-500 rounded-2xl blur opacity-25"></div>
    <div class="premium-card relative text-center py-8">
        <div class="w-16 h-16 bg-green-500/20 text-green-400 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <h2 class="text-2xl font-bold text-white mb-4">Password Reset Success</h2>
        <p class="text-sm text-gray-400 mb-8 leading-relaxed">
            Your new password has been successfully configured. You may now log in to your account with your new credentials.
        </p>
        <a href="{% url 'login' %}" class="inline-block w-full bg-brand text-white py-3 px-4 rounded-xl font-bold hover:bg-brand-hover transition-all">
            Log In Now
        </a>
    </div>
</div>
{% endblock %}
