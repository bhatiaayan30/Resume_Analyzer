{% extends 'analyzer/base.html' %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-12 relative">
    <div class="absolute -inset-1 bg-gradient-to-r from-brand to-indigo-500 rounded-2xl blur opacity-25"></div>
    <div class="premium-card relative">
        <h2 class="text-2xl font-bold text-white mb-6">Reset your password</h2>
        <p class="text-sm text-gray-400 mb-6">Enter your email address and we will send you a link to reset your password.</p>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {% for field in form %}
            <div>
                <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-400 mb-1">{{ field.label }}</label>
                {{ field }}
            </div>
            {% endfor %}
            <button type="submit" class="w-full bg-brand text-white py-3 px-4 rounded-xl font-bold hover:bg-brand-light transition-all mt-4">Send Reset Email</button>
        </form>
    </div>
</div>
<style>
    input[type="email"] {
        width: 100%;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        padding: 0.75rem 1rem;
        border-radius: 0.5rem;
    }
</style>
{% endblock %}
