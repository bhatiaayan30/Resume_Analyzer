databases:
  - name: resume-analyzer-db
    databaseName: resume_analyzer
    user: resume_user
    plan: free

services:
  - type: web
    name: resume-analyzer
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn resume_analyzer.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: resume-analyzer-db
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: "*"
